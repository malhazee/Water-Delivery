<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Station Location</title>
    <link rel="stylesheet" href="choose-location.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Choose Station Location</h1>
            <p>Search for the station on Google Maps or click the map to choose it manually</p>
        </div>

        <div class="search-panel">
            <div class="search-box">
                <input type="text" id="locationInput" placeholder="Search station or location (e.g., Amman water station)">
                <button id="searchBtn" class="btn-search">Search</button>
            </div>
            <div id="searchStatus" class="search-status"></div>
        </div>
        
        <div class="map-container">
            <div id="map"></div>
        </div>
        
        <div class="controls">
            <input type="text" id="locationNameInput" placeholder="Enter station location name" class="location-name-input">
            <button id="saveBtn" class="btn btn-save">Save Location</button>
            <button id="clearBtn" class="btn btn-clear">Clear</button>
            <button id="cancelBtn" class="btn btn-cancel">Cancel</button>
        </div>
        
        <div id="status" class="status"></div>
    </div>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBDBRej2730DA8u10dSBGWbYwlMu8ut8QA&libraries=places"></script>
    <script src="choose-location.js"></script>
</body>
</html>
