<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Categories</title>
    <link rel="stylesheet" href="manage-categories.css">
</head>
<body>
    <main class="admin-shell">
        <section class="form-panel">
            <h1>Manage Categories</h1>

            <label for="categoryName">Category Name</label>
            <input type="text" id="categoryName" placeholder="Enter category name">

            <label for="categoryDescription">Description</label>
            <textarea id="categoryDescription" rows="4" placeholder="Optional category description"></textarea>

            <label for="sortOrder">Sort Order</label>
            <input type="number" id="sortOrder" min="0" step="1" value="0">

            <label class="toggle-row">
                <input type="checkbox" id="categoryActive" checked>
                <span>Active category</span>
            </label>

            <div class="actions">
                <button type="button" id="saveCategoryBtn" class="btn btn-save">Save Category to Firestore</button>
                <button type="button" id="cancelEditBtn" class="btn btn-muted" hidden>Cancel Edit</button>
                <button type="button" id="clearCategoryBtn" class="btn btn-clear">Clear</button>
                <button type="button" id="loadCategoriesBtn" class="btn btn-secondary">Load Categories</button>
            </div>
            <p id="firebaseStatus" class="firebase-status"></p>
        </section>

        <section class="list-panel">
            <h2>Saved Categories</h2>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Description</th>
                            <th>Sort</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="categoriesTableBody">
                        <tr>
                            <td colspan="5">No categories loaded.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="/__/firebase/12.12.1/firebase-app-compat.js"></script>
    <script src="/__/firebase/12.12.1/firebase-firestore-compat.js"></script>
    <script src="/__/firebase/init.js"></script>
    <script src="manage-categories.js"></script>
</body>
</html>
